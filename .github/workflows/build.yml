name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_HARDLINK: "true"
      CCACHE_NOHASHDIR: "true"
      CCACHE_MAXSIZE: "10G"
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.23

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "build-tools;37.0.0 ndk;27.3.13750724 platforms;android-37.0"

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo 'org.gradle.caching=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.parallel=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx8192m -Dfile.encoding=UTF-8 -XX:+UseParallelGC' >> ~/.gradle/gradle.properties
          echo 'android.native.buildOutput=verbose' >> ~/.gradle/gradle.properties

      - name: Configure Signing (optional)
        run: |
          if [ -n "${{ secrets.KEYSTORE_JKS }}" ]; then
            echo "storeFile=${{ github.workspace }}/keystore.jks" >> local.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
            echo "${{ secrets.KEYSTORE_JKS }}" | base64 --decode > keystore.jks
          fi

      - name: Configure Secrets
        run: |
          echo "apiId=${{ secrets.API_ID }}" >> local.properties
          echo "apiHash=${{ secrets.API_HASH }}" >> local.properties

      - name: Build with Gradle
        run: |
          ./gradlew assembleDebug

      - name: Upload arm64-v8a build apk
        uses: actions/upload-artifact@v7
        with:
          name: nekogram-debug-arm64-v8a
          path: TMessagesProj_App/build/outputs/apk/debug/*-arm64-v8a.apk
